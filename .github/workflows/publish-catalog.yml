name: Publish Catalog

on:
  push:
    branches:
      - main
    paths:
      - "assets/dicts/**"
      - "scripts/convert-qwerty-decks.mjs"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    name: Build and deploy catalog to GitHub Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Build catalog
        run: node scripts/convert-qwerty-decks.mjs

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist/catalog
          destination_dir: catalog
          keep_files: false
